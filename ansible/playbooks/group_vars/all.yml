---
# Common variables for all environments

# Application settings
app_name: pagasa-weather-demo
app_repo: https://github.com/your-username/pagasa-weather-demo.git
deploy_user: juls  # Changed for local testing (use 'deploy' for remote servers)
deploy_path: /opt/pagasa-weather-demo

# Docker settings
docker_compose_version: "2.24.0"
docker_users:
  - juls  # Changed for local testing

# Monitoring settings
monitoring_enabled: true
prometheus_version: v2.50.1
grafana_version: 10.3.3
node_exporter_version: 1.7.0
cadvisor_version: v0.49.1

# Prometheus configuration
prometheus_retention_days: 15
prometheus_scrape_interval: 15s
prometheus_evaluation_interval: 15s

# Grafana configuration
grafana_admin_user: admin
grafana_admin_password: "{{ lookup('env', 'GRAFANA_ADMIN_PASSWORD') | default('changeme123', true) }}"
grafana_port: 3100

# Alert configuration
alertmanager_enabled: true
slack_webhook_url: "{{ lookup('env', 'SLACK_WEBHOOK_URL') | default('', true) }}"

# Security
ufw_enabled: false  # Disabled for local testing
allowed_ports:
  - 22      # SSH
  - 80      # HTTP
  - 443     # HTTPS
  - 3000    # Frontend
  - 8000    # Backend API
  - 3100    # Grafana
  - 9090    # Prometheus (optional, can restrict)
